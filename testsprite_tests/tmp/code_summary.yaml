version: "2"
type: frontend
tech_stack:
  - PHP
  - MySQL
  - Tailwind CSS CDN
  - XAMPP Apache
routes:
  - path: /itipm_php_mysql_starter/login.php
    file: login.php
    auth_required: false
    description: Login page for ITI Project Manager with CSRF protection, demo account hints, and login throttling.
  - path: /itipm_php_mysql_starter/logout.php
    file: logout.php
    auth_required: true
    description: Ends the current authenticated PHP session.
  - path: /itipm_php_mysql_starter/index.php
    file: index.php
    auth_required: true
    description: Authenticated application shell that defaults to the dashboard page.
  - path: /itipm_php_mysql_starter/index.php?page=dashboard
    file: pages/dashboard.php
    auth_required: true
    description: Dashboard with KPI cards, progress metrics, deadlines, and recent activity.
  - path: /itipm_php_mysql_starter/index.php?page=projects
    file: pages/projects.php
    auth_required: true
    description: Project list and project creation workflow for authorized roles.
  - path: /itipm_php_mysql_starter/index.php?page=tasks
    file: pages/tasks.php
    auth_required: true
    description: Task list and task creation workflow with project and assignee selection.
  - path: /itipm_php_mysql_starter/index.php?page=deadlines
    file: pages/deadlines.php
    auth_required: true
    description: Deadline monitoring and reminder workflow.
  - path: /itipm_php_mysql_starter/index.php?page=notifications
    file: pages/notifications.php
    auth_required: true
    description: Notification inbox with filters, mark-read actions, delete actions, and click-to-open behavior.
  - path: /itipm_php_mysql_starter/index.php?page=activity
    file: pages/activity.php
    auth_required: true
    description: Activity log with role-aware visibility and filters.
  - path: /itipm_php_mysql_starter/index.php?page=users
    file: pages/users.php
    auth_required: true
    description: User management for roles allowed by the hierarchy guard.
  - path: /itipm_php_mysql_starter/index.php?page=profile
    file: pages/profile.php
    auth_required: true
    description: Current user profile page.
  - path: /itipm_php_mysql_starter/actions/project-detail.php?id=:id
    file: actions/project-detail.php
    auth_required: true
    description: Project detail page with edit project, archive, member management, progress, and project task list.
  - path: /itipm_php_mysql_starter/actions/task-detail.php?id=:id
    file: actions/task-detail.php
    auth_required: true
    description: Task detail page with edit task, submit proof, review, reopen, submission history, and comments.
features:
  - name: User Login
    description: Authenticate active users by email and password, create a PHP session, and redirect to the authenticated app.
    files:
      - login.php
      - includes/auth.php
      - includes/functions.php
      - config/database.php
    entry_route: /itipm_php_mysql_starter/login.php
    user_interactions:
      - Open the login page.
      - Fill the email input.
      - Fill the password input.
      - Click the Login button.
      - See the dashboard after valid credentials.
      - See an error message after invalid credentials.
      - Trigger temporary browser-session lockout after repeated invalid attempts.
    api_calls:
      - method: POST
        endpoint: /itipm_php_mysql_starter/login.php
    auth_required: false
  - name: Logout
    description: End the current PHP session and return the user to unauthenticated state.
    files:
      - logout.php
      - includes/auth.php
    entry_route: /itipm_php_mysql_starter/logout.php
    user_interactions:
      - Click the logout link from the authenticated layout.
      - Return to the login flow.
    api_calls:
      - method: GET
        endpoint: /itipm_php_mysql_starter/logout.php
    auth_required: true
  - name: Dashboard
    description: View real application metrics, project progress, deadline follow-up, and recent activity after login.
    files:
      - index.php
      - pages/dashboard.php
      - includes/header.php
      - includes/sidebar.php
      - includes/functions.php
    entry_route: /itipm_php_mysql_starter/index.php?page=dashboard
    user_interactions:
      - Login with a demo account.
      - Review dashboard KPI values.
      - Inspect progress and deadline sections.
      - Navigate using sidebar menu links.
    api_calls:
      - method: GET
        endpoint: /itipm_php_mysql_starter/index.php?page=dashboard
    auth_required: true
  - name: Project Management
    description: Create projects, open project details, update project metadata, manage project members, and archive projects according to role permissions.
    files:
      - pages/projects.php
      - actions/project-detail.php
      - includes/functions.php
    entry_route: /itipm_php_mysql_starter/index.php?page=projects
    user_interactions:
      - Open the Projects page.
      - Fill title, description, deadline, and members for a new project when permitted.
      - Submit the project form.
      - Open an existing project detail page.
      - Edit project fields when permitted.
      - Add or remove project members when permitted.
      - Archive a project when business rules allow it.
    api_calls:
      - method: GET
        endpoint: /itipm_php_mysql_starter/index.php?page=projects
      - method: POST
        endpoint: /itipm_php_mysql_starter/index.php?page=projects
      - method: GET
        endpoint: /itipm_php_mysql_starter/actions/project-detail.php?id=:id
      - method: POST
        endpoint: /itipm_php_mysql_starter/actions/project-detail.php?id=:id
    auth_required: true
  - name: Task Workflow
    description: Create tasks, assign users, edit task details, submit proof, review submitted proof, reopen approved tasks, and track submission history.
    files:
      - pages/tasks.php
      - actions/task-detail.php
      - actions/task-submit.php
      - actions/task-review.php
      - includes/functions.php
    entry_route: /itipm_php_mysql_starter/index.php?page=tasks
    user_interactions:
      - Open the Tasks page.
      - Select project and fill task title, description, deadline, and assignees when permitted.
      - Submit a new task.
      - Open a task detail page.
      - Edit task fields when allowed and not locked by review state.
      - Submit proof with a note and optional file.
      - Approve or reject submitted proof as a reviewer.
      - Reopen an approved task with a required reason.
      - Inspect submission and review history.
    api_calls:
      - method: GET
        endpoint: /itipm_php_mysql_starter/index.php?page=tasks
      - method: POST
        endpoint: /itipm_php_mysql_starter/index.php?page=tasks
      - method: GET
        endpoint: /itipm_php_mysql_starter/actions/task-detail.php?id=:id
      - method: POST
        endpoint: /itipm_php_mysql_starter/actions/task-detail.php?id=:id
      - method: POST
        endpoint: /itipm_php_mysql_starter/actions/task-submit.php
      - method: POST
        endpoint: /itipm_php_mysql_starter/actions/task-review.php
    auth_required: true
  - name: Task Comments
    description: Add and delete task comments for authorized task participants and reviewers.
    files:
      - actions/task-detail.php
      - actions/task-comment.php
      - includes/functions.php
    entry_route: /itipm_php_mysql_starter/actions/task-detail.php?id=:id
    user_interactions:
      - Open a task detail page.
      - Type a comment.
      - Submit the comment form.
      - Delete an allowed comment after confirmation.
    api_calls:
      - method: POST
        endpoint: /itipm_php_mysql_starter/actions/task-comment.php
    auth_required: true
  - name: Notifications
    description: View, filter, mark, clear, delete, and open notifications linked to projects or tasks.
    files:
      - pages/notifications.php
      - actions/notification-open.php
      - actions/deadline-reminder.php
      - includes/functions.php
    entry_route: /itipm_php_mysql_starter/index.php?page=notifications
    user_interactions:
      - Open the Notifications page.
      - Filter notifications by status or type.
      - Mark notifications as read.
      - Delete a notification.
      - Click a notification to open its linked project or task.
      - Trigger deadline reminders from the Deadlines page.
    api_calls:
      - method: GET
        endpoint: /itipm_php_mysql_starter/index.php?page=notifications
      - method: POST
        endpoint: /itipm_php_mysql_starter/index.php?page=notifications
      - method: GET
        endpoint: /itipm_php_mysql_starter/actions/notification-open.php?id=:id
      - method: POST
        endpoint: /itipm_php_mysql_starter/actions/deadline-reminder.php
    auth_required: true
  - name: Activity Log
    description: Review role-filtered activity records and filter by action, actor, or target.
    files:
      - pages/activity.php
      - includes/functions.php
    entry_route: /itipm_php_mysql_starter/index.php?page=activity
    user_interactions:
      - Open the Activity page.
      - Apply action, actor, or target filters.
      - Open linked activity targets when available.
    api_calls:
      - method: GET
        endpoint: /itipm_php_mysql_starter/index.php?page=activity
    auth_required: true
  - name: User Management
    description: Create users, edit users, reset passwords, and enforce role hierarchy constraints.
    files:
      - pages/users.php
      - includes/functions.php
    entry_route: /itipm_php_mysql_starter/index.php?page=users
    user_interactions:
      - Login as SUPERADMIN, ADMIN, or MODERATOR.
      - Open the Users page when role permits it.
      - Create a user using allowed role options.
      - Edit user attributes and status when permitted.
      - Reset a user password.
      - Verify unauthorized roles are redirected away from the Users page.
    api_calls:
      - method: GET
        endpoint: /itipm_php_mysql_starter/index.php?page=users
      - method: POST
        endpoint: /itipm_php_mysql_starter/index.php?page=users
    auth_required: true
known_limitations:
  - issue: Dynamic detail URLs require existing database IDs for reliable end-to-end tests.
    location: actions/project-detail.php and actions/task-detail.php
    impact: Tests that open project or task detail pages should discover records from list pages or use seeded fixture data.
  - issue: Some destructive actions use browser confirm dialogs.
    location: project member removal, project archive, notification deletion, and comment deletion forms
    impact: Automated tests need to accept confirmation dialogs before asserting final state.
  - issue: External Tailwind CDN is loaded on the login page.
    location: login.php
    impact: Visual styling may degrade if the test environment cannot reach the CDN, though PHP functionality remains testable.
